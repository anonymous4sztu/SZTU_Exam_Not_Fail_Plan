name: 📚 上传复习资料
description: 请按【课程编号课程名称】格式提交复习资料
title: "[资料上传] 课程编号课程名称"
labels:
  - resources
  - documentation

body:
  - type: input
    id: course
    attributes:
      label: 课程编号 + 课程名称
      description: 请严格使用「课程编号课程名称」格式
      placeholder: 例如：IB12345操作系统
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: 资料标题
      description: 简要说明资料内容（不要再写课程名）
      placeholder: 例如：期末复习笔记 / 某一学期真题
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: 资料类型
      options:
        - 真题
        - 重点复习笔记
        - 其他
    validations:
      required: true

  - type: textarea
    id: resource
    attributes:
      label: 资料链接或附件
      description: 可直接上传文件（≤25MB）
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 其他说明
      description: 作者、使用建议等
